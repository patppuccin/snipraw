<svg width="680" height="460" viewBox="130 20 360 410" role="img" xmlns="http://www.w3.org/2000/svg">
    <title>snipraw terminal</title>
    <desc>A minimal flat CRT monitor displaying snipraw code in purple phosphor</desc>

    <defs>
        <style>
            @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
            .cursor { animation: blink 1.1s step-end infinite; }
            @keyframes flicker { 0%,100%{opacity:1} 92%{opacity:0.97} 96%{opacity:1}
            98%{opacity:0.96} }
            .sg { animation: flicker 6s infinite; }
            @keyframes pulse { 0%,100%{opacity:0.9} 50%{opacity:0.3} }
            .led { animation: pulse 2s ease-in-out infinite; }
      </style>
    </defs>

    <rect x="158" y="38" width="364" height="364" rx="14" fill="#141210" />
    <rect x="161" y="41" width="358" height="358" rx="12" fill="#242220" stroke="#0d0c0a"
        stroke-width="1" />

    <rect x="182" y="62" width="316" height="256" rx="7" fill="#0f0e0d" />
    <rect x="185" y="65" width="310" height="250" rx="5" fill="#131211" />
    <rect x="188" y="68" width="304" height="244" rx="4" fill="#161514" />
    <rect x="185" y="65" width="310" height="2" fill="#050405" opacity="0.8" />
    <rect x="185" y="65" width="2" height="250" fill="#050405" opacity="0.6" />

    <g class="sg">
        <text x="202" y="90" font-family="monospace" font-size="12" fill="#6fa783" opacity="0.75"
            letter-spacing="3">✦ SNIPPETS VAULT</text>

        <text x="202" y="112" font-family="monospace" font-size="12" fill="#7db896" opacity="0.85">╭─
            Parent Dir:</text>
        <text x="306" y="112" font-family="monospace" font-size="12" fill="#a3c9b0" opacity="0.95">
            ~/snippets</text>

        <text x="202" y="134" font-family="monospace" font-size="12" fill="#7db896" opacity="0.85">├─
            ▸</text>
        <text x="232" y="134" font-family="monospace" font-size="12" fill="#a3c9b0" opacity="0.9">
            dotfiles</text>

        <text x="202" y="154" font-family="monospace" font-size="12" fill="#7db896" opacity="0.85">├─
            ▸</text>
        <text x="232" y="154" font-family="monospace" font-size="12" fill="#a3c9b0" opacity="0.9">
            technical-debt</text>

        <text x="202" y="174" font-family="monospace" font-size="12" fill="#7db896" opacity="0.85">├─
            ▸</text>
        <text x="232" y="174" font-family="monospace" font-size="12" fill="#a3c9b0" opacity="0.9">
            free-real-estate</text>

        <text x="202" y="194" font-family="monospace" font-size="12" fill="#7db896" opacity="0.85">├─
            ▸</text>
        <text x="232" y="194" font-family="monospace" font-size="12" fill="#a3c9b0" opacity="0.9">
            yolo-driven-development</text>

        <text x="202" y="214" font-family="monospace" font-size="12" fill="#7db896" opacity="0.85">╰─
            ▸</text>
        <text x="232" y="214" font-family="monospace" font-size="12" fill="#a3c9b0" opacity="0.9">
            arch-btw</text>

        <text x="202" y="250" font-family="monospace" font-size="12" fill="#6fa783" opacity="0.9">$</text>
        <rect x="217" y="239" width="8" height="13" fill="#6fa783" opacity="0.9" class="cursor" />
    </g>

    <text x="185" y="366" font-family="monospace" font-size="12" font-weight="bold" fill="#6fa783"
        letter-spacing="7" opacity="0.9">SNIPRAW</text>

    <circle cx="418" cy="360" r="11" fill="#111010" stroke="#252220" stroke-width="1" />
    <circle cx="418" cy="360" r="7" fill="#1a1814" />
    <line x1="418" y1="353" x2="418" y2="357" stroke="#6fa783" stroke-width="1.5"
        stroke-linecap="round" opacity="0.75" />

    <circle cx="445" cy="360" r="11" fill="#111010" stroke="#252220" stroke-width="1" />
    <circle cx="445" cy="360" r="7" fill="#1a1814" />
    <line x1="442" y1="355" x2="445" y2="360" stroke="#6fa783" stroke-width="1.5"
        stroke-linecap="round" opacity="0.75" />

    <rect x="461" y="349" width="20" height="22" rx="3" fill="#111010" stroke="#252220"
        stroke-width="1" />
    <rect x="464" y="352" width="14" height="16" rx="2" fill="#1a1814" />

    <circle cx="492" cy="360" r="4.5" fill="#6fa783" opacity="0.9" class="led" />

    <ellipse cx="340" cy="418" rx="160" ry="8" fill="#000000" opacity="0.18" />
    <ellipse cx="340" cy="424" rx="110" ry="4" fill="#000000" opacity="0.1" />
</svg>